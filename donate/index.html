<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Donate — Richard&lt;CORE&gt;</title>

  <meta name="description" content="Support the development of Richard&lt;CORE&gt; and its open digital tools through cryptocurrency donations.">
  <meta name="author" content="Richard&lt;CORE&gt;">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://richardcore.com/donate/">
  <meta name="theme-color" content="#111111">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Richard&lt;CORE&gt;">
  <meta property="og:title" content="Donate — Richard&lt;CORE&gt;">
  <meta property="og:description" content="Support the development of Richard&lt;CORE&gt; and its open digital tools through cryptocurrency donations.">
  <meta property="og:url" content="https://richardcore.com/donate/">
  <meta property="og:image" content="https://richardcore.com/assets/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Donate — Richard&lt;CORE&gt;">
  <meta name="twitter:description" content="Support the development of Richard&lt;CORE&gt; and its open digital tools through cryptocurrency donations.">
  <meta name="twitter:image" content="https://richardcore.com/assets/images/og-image.png">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Donate",
      "url": "https://richardcore.com/donate/",
      "description": "Support the development of Richard<CORE> and its open digital tools through cryptocurrency donations.",
      "inLanguage": "en"
    }
  </script>

  <link rel="stylesheet" href="../styles/base/tokens.css">
  <link rel="stylesheet" href="../styles/base/themes.css">
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="./donate.css">
</head>
<body>
  <div id="header-root"></div>

  <main>
    <section class="donate-page">
        <div class="donate-inner">

        <h1 class="donate-title">
            Support Richard&lt;CORE&gt;
        </h1>

        <p class="donate-description">
            Richard&lt;CORE&gt; is an independent project.</br></br>

            If these tools have been useful to you,</br>
            consider supporting their continued development.</br>

            Every donation helps create new tools, improve</br>
            existing ones and keep the project moving forward.
        </p>

        <section class="donate-crypto-section">
            <h2 class="donate-section-title">Crypto</h2>

            <div class="crypto-grid">

            <button class="crypto-card" data-crypto="btc" type="button">
                <img src="../assets/images/donate/crypto/don_btc.webp" alt="Bitcoin QR">
                <span>Bitcoin</span>
            </button>

            <button class="crypto-card" data-crypto="eth" type="button">
                <img src="../assets/images/donate/crypto/don_eth.webp" alt="Ethereum QR">
                <span>Ethereum</span>
            </button>

            <button class="crypto-card" data-crypto="usdt" type="button">
                <img src="../assets/images/donate/crypto/don_usdt.webp" alt="USDT QR">
                <span>USDT</span>
            </button>

            <button class="crypto-card" data-crypto="usdc" type="button">
                <img src="../assets/images/donate/crypto/don_usdc.webp" alt="USDC QR">
                <span>USDC</span>
            </button>

            <button class="crypto-card" data-crypto="sol" type="button">
                <img src="../assets/images/donate/crypto/don_sol.webp" alt="Solana QR">
                <span>Solana</span>
            </button>

            <button class="crypto-card" data-crypto="ton" type="button">
                <img src="../assets/images/donate/crypto/don_ton.webp" alt="TON QR">
                <span>TON</span>
            </button>

            <button class="crypto-card" data-crypto="ltc" type="button">
                <img src="../assets/images/donate/crypto/don_ltc.webp" alt="Litecoin QR">
                <span>Litecoin</span>
            </button>

            <button class="crypto-card" data-crypto="doge" type="button">
                <img src="../assets/images/donate/crypto/don_doge.webp" alt="Dogecoin QR">
                <span>Dogecoin</span>
            </button>

            <button class="crypto-card" data-crypto="trx" type="button">
                <img src="../assets/images/donate/crypto/don_trx.webp" alt="Tron QR">
                <span>Tron</span>
            </button>

            </div>
        </section>

        </div>
    </section>

    <div class="crypto-modal" id="crypto-modal" aria-hidden="true">
        <div class="crypto-modal-backdrop" data-modal-close></div>

        <div class="crypto-modal-panel">
        <button class="crypto-modal-close" data-modal-close type="button">
            ×
        </button>

        <h2 class="crypto-modal-title" id="crypto-modal-title"></h2>

        <img class="crypto-modal-qr" id="crypto-modal-qr" src="" alt="">

        <div class="crypto-address-box">
            <code id="crypto-modal-address"></code>
        </div>

        <button class="button button-primary" id="crypto-copy-button" type="button">
            Copy address
        </button>
        </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../main.js"></script>
  <script type="module" src="./donate.js"></script>
</body>
</html>
