<!DOCTYPE html>
<html lang="en" data-tool-slug="whiteboard">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Whiteboard / Tools / Richard&lt;CORE&gt;</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.svg"> 
  <link rel="stylesheet" href="../../styles/base/tokens.css" />
  <link rel="stylesheet" href="../../styles/base/themes.css" />
  <link rel="stylesheet" href="../../styles/style.css" />
  <link rel="stylesheet" href="./whiteboard.css" />
</head>

<body>

  <div id="header-root"></div>

  <main>
    <div class="app-container">

      <div class="whiteboard-page-shell">

        <div class="whiteboard-stage">

          <div class="whiteboard-toolbar">
            <div class="whiteboard-toolbar-left">
              <button type="button" data-action="export-png" data-standalone-only>Export PNG</button>
              <button type="button" data-action="copy-clipboard">Copy to clipboard</button>
              <button type="button" data-action="export-node" data-embedded-only>Export to Node</button>
              <button type="button" data-action="clear">Clear</button>
            </div>

            <div class="whiteboard-toolbar-right">

              <div class="whiteboard-toolbar-group">
                <span class="whiteboard-toolbar-label">Brushes</span>

                <div class="whiteboard-brush-sizes">
                  <button type="button" data-size="2"><span style="width:2px;height:2px;"></span></button>
                  <button type="button" data-size="4"><span style="width:4px;height:4px;"></span></button>
                  <button type="button" data-size="6"><span style="width:6px;height:6px;"></span></button>
                  <button type="button" data-size="8"><span style="width:8px;height:8px;"></span></button>
                  <button type="button" data-size="12"><span style="width:12px;height:12px;"></span></button>
                  <button type="button" data-size="16"><span style="width:16px;height:16px;"></span></button>
                  <button type="button" data-size="24"><span style="width:24px;height:24px;"></span></button>
                </div>
              </div>

              <div class="whiteboard-toolbar-group">
                <span class="whiteboard-toolbar-label">Colors</span>

                <div class="whiteboard-color-row">
                  <button type="button" data-color="#FF2E7B" style="background:#FF2E7B;"></button>
                  <button type="button" data-color="#FF3636" style="background:#FF3636;"></button>
                  <button type="button" data-color="#FF8000" style="background:#FF8000;"></button>
                  <button type="button" data-color="#FFEA00" style="background:#FFEA00;"></button>
                  <button type="button" data-color="#BFFF00" style="background:#BFFF00;"></button>
                  <button type="button" data-color="#00FF40" style="background:#00FF40;"></button>

                  <button type="button" data-color="#00FFCC" style="background:#00FFCC;"></button>
                  <button type="button" data-color="#00D0FF" style="background:#00D0FF;"></button>
                  <button type="button" data-color="#0095FF" style="background:#0095FF;"></button>
                  <button type="button" data-color="#5768FF" style="background:#5768FF;"></button>
                  <button type="button" data-color="#9B30FF" style="background:#9B30FF;"></button>
                  <button type="button" data-color="#FF2ED5" style="background:#FF2ED5;"></button>
                  
                  <button type="button" data-color="#ffffff" style="background:#ffffff;"></button>
                  <button type="button" data-color="#000000" style="background:#000000;"></button>
                </div>
              </div>
            </div>
          </div>

          <div class="whiteboard-workspace">
            <svg class="whiteboard-svg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>

        </div>

      </div>

    </div>
  </main>

  <div id="footer-root"></div>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="module" src="../../main.js"></script>
  <script type="module" src="./whiteboard.js"></script>

</body>
</html>
