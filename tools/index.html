<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RichardCore</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="stylesheet" href="../styles/base/tokens.css">
  <link rel="stylesheet" href="../styles/base/themes.css">
  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="stylesheet" href="./tools.css">
</head>
<body>
  <div id="header-root"></div>

  <main>
    <section class="tools-page">
      <div class="tools-inner">

        <h1 class="tools-title">Tools</h1>

        <p class="tools-description">
          A collection of focused browser-based tools.
        </p>

        <div class="tools-grid">

          <a class="tool-card" href="./construct/">

            <div class="tool-card-preview">
              <img
                src="../assets/images/tools/construct.webp"
                alt="ConStruct preview">
            </div>

            <div class="tool-card-body">
              <h2 class="tool-card-title">
                ConStruct
              </h2>

              <p class="tool-card-text">
                Visual node editor for planning and structured thinking.
              </p>
            </div>

          </a>

          <a class="tool-card" href="./whiteboard/">

            <div class="tool-card-preview">
              <img
                src="../assets/images/tools/whiteboard.webp"
                alt="Whiteboard preview">
            </div>

            <div class="tool-card-body">
              <h2 class="tool-card-title">
                Whiteboard
              </h2>

              <p class="tool-card-text">
                Canvas for sketches, notes and free-form ideas.
              </p>
            </div>

          </a>

          <div class="tool-card tool-card-disabled">

            <div class="tool-card-preview">
              <img
                src="../assets/images/tools/project_c.webp"
                alt="Project C preview">
            </div>

            <div class="tool-card-body">
              <h2 class="tool-card-title">
                Project C
              </h2>

              <p class="tool-card-text">
                Next project.
              </p>
            </div>

          </div>

        </div>

      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../main.js"></script>
</body>
</html>
